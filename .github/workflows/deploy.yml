name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  HOST: ${{ secrets.AWS_HOST }}
  USER: ${{ secrets.AWS_USER }}
  SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
  PORT: ${{ secrets.AWS_PORT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Test SSH Connection
      run: |
        echo "Testing SSH connection to AWS..."
        echo "Host: ${{ env.HOST }}"
        echo "User: ${{ env.USER }}"
        echo "Port: ${{ env.PORT }}"
        
    - name: Deploy to AWS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ env.HOST }}
        username: ${{ env.USER }}
        key: ${{ env.SSH_KEY }}
        port: ${{ env.PORT }}
        timeout: 120s
        command_timeout: 60s
        script: |
          echo "Successfully connected to AWS!"
          pwd
          ls -la
          
          # Stop existing containers
          cd /home/ubuntu/aivideo_editor || mkdir -p /home/ubuntu/aivideo_editor
          docker-compose down || true
          
          # Pull latest code
          git pull origin main
          
          # Build and start services
          docker-compose build
          docker-compose up -d
          
          # Clean up old images
          docker image prune -f
          
          # Show status
          docker-compose ps
          docker logs video-editor-app --tail=20
