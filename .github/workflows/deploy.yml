name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Debug secrets
      run: |
        echo "AWS_HOST is set: ${{ secrets.AWS_HOST != '' }}"
        echo "AWS_USER is set: ${{ secrets.AWS_USER != '' }}"
        echo "AWS_PORT is set: ${{ secrets.AWS_PORT != '' }}"
        echo "AWS_SSH_KEY is set: ${{ secrets.AWS_SSH_KEY != '' }}"
        
    - name: Deploy to AWS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USER }}
        key: ${{ secrets.AWS_SSH_KEY }}
        port: ${{ secrets.AWS_PORT }}
        timeout: 120s
        command_timeout: 60s
        script: |
          # Stop existing containers
          cd /home/ubuntu/aivideo_editor || mkdir -p /home/ubuntu/aivideo_editor
          docker-compose down || true
          
          # Pull latest code
          git pull origin main
          
          # Build and start services
          docker-compose build
          docker-compose up -d
          
          # Clean up old images
          docker image prune -f
          
          # Show status
          docker-compose ps
          docker logs video-editor-app --tail=20
