services:
  video-editor:
    build: .
    container_name: video-editor-app
    command: ["python", "app_minimal.py"]
    ports:
      - "5555:5555"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
    environment:
      - PYTHONPATH=/app
      - FLASK_APP=app_minimal.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
    restart: unless-stopped
    networks:
      - video-editor-network

  nginx:
    image: nginx:alpine
    container_name: video-editor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/uploads:ro
      - outputs:/app/outputs:ro
    depends_on:
      - video-editor
    restart: unless-stopped
    networks:
      - video-editor-network

networks:
  video-editor-network:
    driver: bridge

volumes:
  uploads:
    driver: local
  outputs:
    driver: local
  audio:
    driver: local
  transcripts:
    driver: local
  previews:
    driver: local
